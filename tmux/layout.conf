# =============================================================================
# layout.conf — Tmux window layout for cocos-agent-team
# Source:  tmux source-file ~/cocos-agent-team/tmux/layout.conf
# =============================================================================

# Better styling
set -g window-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g window-active-style 'bg=#11111b,fg=#cdd6f4'
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'

# Activity monitoring
setw -g monitor-activity on
setw -g visual-activity off

# Don't rename windows automatically
setw -g automatic-rename off
set -g allow-rename off

# Scrollback
set -g history-limit 10000

# Mouse
set -g mouse on

# Start at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber on close
set -g renumber-windows on

# Quick navigation bindings
bind-key -T prefix w choose-window
bind-key -T prefix s choose-session
bind-key -T prefix | split-window -h -c "#{pane_current_path}"
bind-key -T prefix - split-window -v -c "#{pane_current_path}"
bind-key -T prefix r source-file ~/.tmux.conf \; display "Config reloaded!"
